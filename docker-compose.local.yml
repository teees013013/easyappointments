# Local development stack for integration testing with product frontends (e.g. Padlockd PWA)
# Usage: docker compose -f docker-compose.local.yml up --build
#
# EA will be available at http://localhost:8080
# First visit: http://localhost:8080/installation to create admin account

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: easyappointments
      MYSQL_USER: ea_user
      MYSQL_PASSWORD: ea_pass
    ports:
      - "3307:3306"
    volumes:
      - ea_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  easyappointments:
    build:
      context: .
      dockerfile: Dockerfile.production
    ports:
      - "8080:80"
    environment:
      EA_BASE_URL: "http://localhost:8080"
      EA_DB_HOST: mysql
      EA_DB_PORT: "3306"
      EA_DB_NAME: easyappointments
      EA_DB_USERNAME: ea_user
      EA_DB_PASSWORD: ea_pass
      EA_DB_SSL: "false"
      EA_DEBUG_MODE: "true"
      EA_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      EA_GOOGLE_SYNC: "false"
      # EA_GOOGLE_CLIENT_ID: ""
      # EA_GOOGLE_CLIENT_SECRET: ""
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  ea_mysql_data:
